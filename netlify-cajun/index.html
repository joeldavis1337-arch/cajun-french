  const res = await fetch("/.netlify/functions/translate", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      english
    })
  });
  const data = await res.json();
  if (data.error) throw new Error("API error: " + data.error.message);
  const text = data.content?.find(b => b.type === "text")?.text || "";
  if (!text) throw new Error("Empty response");
  return JSON.parse(text.replace(/```json|```/g, "").trim());
}
async function sendConversationMessage(messages, scenario, kidsMode) {
  const res = await fetch("/.netlify/functions/conversation", {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      messages,
      scenario,
      kidsMode: kidsMode || false
    })
  });
  const data = await res.json();
  if (data.error) throw new Error("API error: " + data.error.message);
  const text = data.content?.find(b => b.type === "text")?.text || "";
  if (!text) throw new Error("Empty response");
  return text;
}

function SpeakBtn({
  text,
  small
}) {
  const [speaking, setSpeaking] = React.useState(false);
  const handleSpeak = e => {
    e.stopPropagation();
    if (!window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    const voices = window.speechSynthesis.getVoices();
    const frVoice = voices.find(v => v.lang && v.lang.startsWith("fr"));
    if (frVoice) utt.voice = frVoice;
    utt.lang = "fr-FR";
    utt.rate = 0.85;
    setSpeaking(true);
    utt.onend = () => setSpeaking(false);
    utt.onerror = () => setSpeaking(false);
    window.speechSynthesis.speak(utt);
  };
  const size = small ? "22px" : "32px";
  return React.createElement("button", {
    onClick: handleSpeak,
    title: "Listen",
    style: {
      background: "none",

      borderRadius: "50%",
